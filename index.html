<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PDF Annotator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;
  --surface:#18181c;
  --surface2:#222228;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.18);
  --text:#f0eee8;
  --muted:#777;
  --accent:#e8c97a;
  --accent2:#c4a84a;
  --toolbar-h:52px;
  --rail-w:56px;
  --idx-w:148px;
  touch-action:none;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;-webkit-user-select:none;
}
header{
  height:var(--toolbar-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:8px;
  flex-shrink:0;z-index:30;
}
.logo{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.04em;white-space:nowrap;margin-right:2px}
.hd-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.file-name{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-status{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
.save-dot.saved{background:#4caf88}
.save-dot.saving{background:var(--accent);animation:pulse .7s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hd-btn{
  display:flex;align-items:center;gap:4px;padding:6px 11px;
  border:1px solid var(--border2);border-radius:6px;
  background:transparent;color:var(--text);
  font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0;
}
.hd-btn:hover{background:var(--surface2);border-color:rgba(255,255,255,.28)}
.hd-btn.primary{background:var(--accent);color:#111;border-color:var(--accent);font-weight:700}
.hd-btn.primary:hover{background:var(--accent2)}
#file-in{display:none}
.app-body{display:flex;flex:1;overflow:hidden}

/* TOOL RAIL */
.tool-rail{
  width:var(--rail-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;gap:3px;flex-shrink:0;overflow-y:auto;z-index:10;
}
.rail-sep{width:30px;height:1px;background:var(--border);margin:5px 0}
.t{
  width:40px;height:40px;border:1px solid transparent;border-radius:7px;
  background:transparent;color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;position:relative;
}
.t:hover{background:var(--surface2);color:var(--text)}
.t.on{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.t .tip{
  position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);
  background:#2a2a30;color:#ddd;font-size:10px;padding:3px 7px;border-radius:4px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;
  z-index:200;border:1px solid var(--border2);
}
.t:hover .tip{opacity:1}
.picker-wrap{
  margin-top:auto;padding:8px 0 6px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;
}
.lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.vslider{
  -webkit-appearance:none;appearance:none;
  writing-mode:vertical-lr;direction:rtl;
  width:28px;height:72px;background:transparent;cursor:pointer;
}
.vslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.vslider::-webkit-slider-runnable-track{width:3px;background:var(--border2);border-radius:4px}
.swatches{display:flex;flex-direction:column;gap:3px;align-items:center}
.sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .1s;}
.sw.on,.sw:hover{border-color:#fff;transform:scale(1.18)}

/* PAGE INDEX */
.page-index{
  width:var(--idx-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .2s ease;
}
.page-index.collapsed{width:0;border-right:none}
.idx-header{
  padding:10px 10px 6px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.idx-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.idx-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px}
.idx-list{overflow-y:auto;flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:8px;}
.thumb-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:4px;border-radius:6px;
  border:1px solid transparent;transition:all .12s;
}
.thumb-item:hover{background:var(--surface2)}
.thumb-item.active{border-color:var(--accent);background:rgba(232,201,122,.07)}
.thumb-canvas{display:block;border-radius:3px;border:1px solid var(--border2);max-width:100%}
.thumb-lbl{font-size:10px;color:var(--muted)}
.thumb-item.active .thumb-lbl{color:var(--accent)}

/* CANVAS AREA */
.canvas-area{
  flex:1;overflow:auto;background:#1a1a1e;
  display:flex;flex-direction:column;align-items:center;
  padding:20px;gap:20px;position:relative;
}
.page-wrap{position:relative;flex-shrink:0;box-shadow:0 6px 40px rgba(0,0,0,.6);}
.page-wrap canvas{display:block;position:absolute;top:0;left:0}
.c-pdf{z-index:1}
.c-ann{z-index:2;cursor:crosshair}
#txt-in{
  position:fixed;z-index:100;border:none;
  outline:2px dashed var(--accent);
  background:rgba(232,201,122,.06);
  color:inherit;font-family:'Segoe UI',sans-serif;
  padding:2px 4px;resize:none;overflow:hidden;
  min-width:80px;min-height:30px;line-height:1.4;display:none;
}
.empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--muted);pointer-events:none;
}
.e-icon{font-size:48px;opacity:.2}
.empty h2{font-size:18px;color:#555;font-weight:500}
.empty p{font-size:12px;text-align:center;max-width:260px;line-height:1.6}
.e-btn{pointer-events:all;background:var(--accent);color:#111;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer}

/* PAGE BAR */
.page-bar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:28px;display:none;align-items:center;gap:6px;
  padding:5px 12px;z-index:40;box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.pb-btn{
  background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all .1s;
}
.pb-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.pb-btn:disabled{opacity:.25;cursor:not-allowed}
.pb-inp{width:28px;background:none;border:none;text-align:center;font-size:11px;font-family:monospace;color:var(--text);}
.pb-inp:focus{outline:1px solid var(--accent);border-radius:3px}
.pb-total{font-size:11px;color:var(--muted);font-family:monospace}

/* ZOOM */
.zoom-wrap{position:fixed;right:14px;bottom:14px;display:none;flex-direction:column;gap:3px;z-index:40;}
.zb{
  width:30px;height:30px;background:var(--surface);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.zb:hover{background:var(--surface2)}

.toast{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-size:12px;padding:7px 16px;border-radius:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
</style>
</head>
<body>

<header>
  <span class="logo">✒ Annotate</span>
  <div class="hd-sep"></div>
  <span class="file-name" id="file-name">Ningún archivo abierto</span>
  <span class="save-status" id="save-status" style="display:none">
    <span class="save-dot" id="save-dot"></span>
    <span id="save-txt">Guardado</span>
  </span>
  <button class="hd-btn" id="idx-btn" style="display:none" onclick="toggleIdx()">☰ Índice</button>
  <button class="hd-btn" id="undo-btn" style="display:none" onclick="undoPage()">↩ Deshacer</button>
  <button class="hd-btn" id="clear-btn" style="display:none" onclick="clearPage()">🗑 Limpiar</button>
  <button class="hd-btn primary" id="exp-btn" style="display:none" onclick="exportPDF()">⬇ Exportar PDF</button>
  <button class="hd-btn" onclick="document.getElementById('file-in').click()">📂 Abrir PDF</button>
  <input type="file" id="file-in" accept=".pdf"/>
</header>

<div class="app-body">
  <div class="tool-rail">
    <button class="t on" id="t-pen"       onclick="setTool('pen')">✏️<span class="tip">Pluma  [P]</span></button>
    <button class="t"    id="t-ink"       onclick="setTool('ink')">🖊<span class="tip">Tinta  [I]</span></button>
    <button class="t"    id="t-highlight" onclick="setTool('highlight')">🖍<span class="tip">Resaltador  [H]</span></button>
    <button class="t"    id="t-eraser"    onclick="setTool('eraser')">⌫<span class="tip">Borrador  [E]</span></button>
    <div class="rail-sep"></div>
    <button class="t"    id="t-line"      onclick="setTool('line')">╱<span class="tip">Línea</span></button>
    <button class="t"    id="t-rect"      onclick="setTool('rect')">▭<span class="tip">Rectángulo</span></button>
    <button class="t"    id="t-circle"    onclick="setTool('circle')">○<span class="tip">Círculo</span></button>
    <div class="rail-sep"></div>
    <button class="t"    id="t-text"      onclick="setTool('text')" style="font-size:13px;font-weight:700">T<span class="tip">Texto  [T]</span></button>
    <div class="picker-wrap">
      <span class="lbl">GROSOR</span>
      <input type="range" class="vslider" id="sz-sl" min="1" max="36" value="3"
        oninput="sz=+this.value;document.getElementById('szv').textContent=this.value+'px'"/>
      <span class="lbl" id="szv">3px</span>
      <div class="rail-sep"></div>
      <span class="lbl">COLOR</span>
      <div class="swatches" id="swatches">
        <div class="sw on"  style="background:#111318" data-c="#111318" onclick="setColor(this)"></div>
        <div class="sw"     style="background:#e8c97a" data-c="#e8c97a" onclick="setColor(this)"></div>
        <div class="sw"     style="background:#3b9eff" data-c="#3b9eff" onclick="setColor(this)"></div>
        <div class="sw"     style="background:#ff6b6b" data-c="#ff6b6b" onclick="setColor(this)"></div>
        <div class="sw"     style="background:#7be07b" data-c="#7be07b" onclick="setColor(this)"></div>
        <div class="sw"     style="background:#c9c9c9" data-c="#c9c9c9" onclick="setColor(this)"></div>
      </div>
    </div>
  </div>

  <div class="page-index" id="page-index">
    <div class="idx-header">
      <span class="idx-title">Índice de páginas</span>
      <button class="idx-close" onclick="toggleIdx()">✕</button>
    </div>
    <div class="idx-list" id="idx-list"></div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <div class="empty" id="empty">
      <div class="e-icon">📄</div>
      <h2>PDF Annotator</h2>
      <p>Carga un PDF y anota con tu pluma, resaltador, formas o texto. Las anotaciones se guardan automáticamente.</p>
      <button class="e-btn" onclick="document.getElementById('file-in').click()">Abrir PDF →</button>
    </div>
  </div>
</div>

<div class="page-bar" id="page-bar">
  <button class="pb-btn" id="pp" onclick="navPage(-1)">‹</button>
  <input type="number" class="pb-inp" id="pg-inp" min="1" value="1"
    onchange="goToPage(+this.value)" onkeydown="if(event.key==='Enter')goToPage(+this.value)"/>
  <span class="pb-total" id="pg-total">/ 1</span>
  <button class="pb-btn" id="np" onclick="navPage(1)">›</button>
</div>

<div class="zoom-wrap" id="zoom-wrap">
  <button class="zb" onclick="doZoom(.15)">+</button>
  <button class="zb" onclick="doZoom(-.15)">−</button>
  <button class="zb" style="font-size:9px;font-weight:700" onclick="doZoom(0,true)">1:1</button>
</div>

<div class="toast" id="toast"></div>
<textarea id="txt-in" rows="2"></textarea>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let pdfDoc=null, totalPgs=0, curPage=1, zoom=1.3;
let tool='pen', color='#111318', sz=3;
let drawing=false;
let ptBuf=[]; // smooth point buffer
let preSnap=null; // canvas state before current stroke starts
let activeAnn=null, activeCtx=null;
let wrappers=[]; // {wrap,pdfC,annC,pg}
let annData={}; // {pg: [{imgData,w,h}]}
let thumbCvs={}; // {pg: canvas}
let fileName='';
let idxOpen=true;

// ── INDEXEDDB AUTO-SAVE ──
// Strategy: save on a 3-minute interval (never during drawing).
// Also save immediately on page hide / beforeunload as safety net.
// toDataURL is expensive — we run it inside requestIdleCallback so it
// never competes with pointer events on the main thread.
let db=null;
(()=>{
  const r=indexedDB.open('pdf-ann-v4',1);
  r.onupgradeneeded=e=>e.target.result.createObjectStore('ann');
  r.onsuccess=e=>{db=e.target.result};
})();

let dirty=false;          // true = unsaved changes exist
let saveIntervalId=null;

function markDirty(){
  dirty=true;
  setSaveState('pending');
}

// Start the 3-minute auto-save clock once a file is loaded
function startAutoSave(){
  clearInterval(saveIntervalId);
  saveIntervalId=setInterval(()=>{
    if(dirty&&!drawing) persistIdle();
  }, 3*60*1000); // 3 minutes
}

// Run persist during browser idle time so drawing is never interrupted
function persistIdle(){
  if('requestIdleCallback' in window){
    requestIdleCallback(()=>persist(),{timeout:4000});
  } else {
    setTimeout(persist,200);
  }
}

function persist(){
  if(!db||!fileName||!dirty)return;
  setSaveState('saving');
  // Collect dataURLs — expensive but now always off the critical path
  const d={};
  wrappers.forEach(({annC,pg})=>{d[pg]=annC.toDataURL('image/png')});
  const tx=db.transaction('ann','readwrite');
  tx.objectStore('ann').put(d,fileName);
  tx.oncomplete=()=>{dirty=false;setSaveState('saved')};
}

function loadSaved(name){
  return new Promise(res=>{
    if(!db){res(null);return}
    const tx=db.transaction('ann','readonly');
    const req=tx.objectStore('ann').get(name);
    req.onsuccess=()=>res(req.result||null);
    req.onerror=()=>res(null);
  });
}
function setSaveState(s){
  const dot=document.getElementById('save-dot');
  const txt=document.getElementById('save-txt');
  const map={saving:'saving',saved:'saved',pending:''};
  dot.className='save-dot'+(map[s]?' '+map[s]:'');
  txt.textContent=s==='saving'?'Guardando…':s==='pending'?'Con cambios sin guardar':'Guardado automáticamente';
}

// Save on visibility change (switching tabs, closing browser)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&dirty) persist();
});
window.addEventListener('beforeunload',()=>{if(dirty)persist()});

// ── FILE LOAD ──
document.getElementById('file-in').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  fileName=f.name;
  document.getElementById('file-name').textContent=f.name;
  const ab=await f.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:ab}).promise;
  totalPgs=pdfDoc.numPages;
  annData={};
  const saved=await loadSaved(fileName);
  await renderAll(saved);
  // Show UI
  document.getElementById('empty').style.display='none';
  document.getElementById('page-bar').style.display='flex';
  document.getElementById('zoom-wrap').style.display='flex';
  document.getElementById('save-status').style.display='flex';
  ['idx-btn','undo-btn','clear-btn','exp-btn'].forEach(id=>document.getElementById(id).style.display='');
  document.getElementById('pg-total').textContent='/ '+totalPgs;
  if(saved) toast('🔄 Anotaciones restauradas');
  else setSaveState('saved');
  startAutoSave();
  e.target.value='';
});

async function renderAll(saved){
  const area=document.getElementById('canvas-area');
  area.querySelectorAll('.page-wrap').forEach(el=>el.remove());
  wrappers=[];thumbCvs={};
  document.getElementById('idx-list').innerHTML='';

  for(let p=1;p<=totalPgs;p++){
    const page=await pdfDoc.getPage(p);
    const vp=page.getViewport({scale:zoom*1.5});

    const wrap=document.createElement('div');
    wrap.className='page-wrap';
    wrap.dataset.pg=p;
    wrap.style.width=vp.width+'px';
    wrap.style.height=vp.height+'px';

    const pdfC=makeCanvas('c-pdf',vp.width,vp.height);
    const annC=makeCanvas('c-ann',vp.width,vp.height);
    wrap.appendChild(pdfC);wrap.appendChild(annC);
    area.appendChild(wrap);

    await page.render({canvasContext:pdfC.getContext('2d'),viewport:vp}).promise;

    // Restore saved annotation layer
    if(saved&&saved[p]){
      await drawImg(annC.getContext('2d'),saved[p],0,0,annC.width,annC.height);
      const ctx=annC.getContext('2d');
      annData[p]=[{imgData:ctx.getImageData(0,0,annC.width,annC.height),w:annC.width,h:annC.height}];
    }

    // Build thumbnail
    const TW=118,TH=Math.round(TW*(vp.height/vp.width));
    const tc=makeCanvas('thumb-canvas',TW,TH);
    tc.style.width=TW+'px';tc.style.height=TH+'px';
    tc.getContext('2d').drawImage(pdfC,0,0,TW,TH);
    thumbCvs[p]=tc;

    const ti=document.createElement('div');
    ti.className='thumb-item'+(p===1?' active':'');
    ti.dataset.pg=p;ti.onclick=()=>scrollToPage(p);
    const lbl=document.createElement('span');
    lbl.className='thumb-lbl';lbl.textContent='Pág. '+p;
    ti.appendChild(tc);ti.appendChild(lbl);
    document.getElementById('idx-list').appendChild(ti);

    setupPointer(annC,p);
    wrappers.push({wrap,pdfC,annC,pg:p});
  }
  setupScrollSpy();
  updateNav();
}

function makeCanvas(cls,w,h){
  const c=document.createElement('canvas');
  c.className=cls;c.width=w;c.height=h;return c;
}
function drawImg(ctx,src,x,y,w,h){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ctx.drawImage(img,x,y,w,h);res()};
    img.src=src;
  });
}

// ── SMOOTH DRAWING ──
// Uses quadratic bezier curves through midpoints for fluid strokes.
// On each pointermove: restore pre-stroke snapshot, then redraw entire
// accumulated stroke — this eliminates the "lift pen" artifact.
function smoothDraw(ctx,pts,lw,col,alpha,comp){
  if(!pts||pts.length<2)return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.globalCompositeOperation=comp;
  ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineJoin='round';

  if(pts.length===2){
    ctx.lineWidth=lw*(0.5+pts[0].p*.5);
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);ctx.stroke();
    ctx.restore();return;
  }
  // Draw with varying width segments for pressure sensitivity
  for(let i=1;i<pts.length-1;i++){
    const p0=pts[i-1],p1=pts[i],p2=pts[i+1];
    const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
    ctx.lineWidth=Math.max(0.5,lw*(0.4+p1.p*.8));
    ctx.beginPath();
    ctx.moveTo((p0.x+p1.x)/2,(p0.y+p1.y)/2);
    ctx.quadraticCurveTo(p1.x,p1.y,mx,my);
    ctx.stroke();
  }
  // Final segment to last point
  const n=pts.length-1;
  ctx.lineWidth=Math.max(0.5,lw*(0.4+pts[n].p*.8));
  ctx.beginPath();
  ctx.moveTo((pts[n-1].x+pts[n].x)/2,(pts[n-1].y+pts[n].y)/2);
  ctx.lineTo(pts[n].x,pts[n].y);
  ctx.stroke();
  ctx.restore();
}

// ── ERASER CURSOR ──
const eraserCursor=document.createElement('div');
eraserCursor.style.cssText='position:fixed;pointer-events:none;border:2px solid rgba(255,255,255,0.7);border-radius:50%;z-index:1000;display:none;transform:translate(-50%,-50%)';
document.body.appendChild(eraserCursor);

function showEraserCursor(x,y,r){
  const d=r*2+'px';
  eraserCursor.style.width=d;eraserCursor.style.height=d;
  eraserCursor.style.left=x+'px';eraserCursor.style.top=y+'px';
  eraserCursor.style.display='block';
}
function hideEraserCursor(){eraserCursor.style.display='none'}

function setupPointer(canvas,pg){
  // Track last point for incremental eraser
  let lastEX=0,lastEY=0;

  canvas.addEventListener('pointerdown',e=>{
    if(tool==='text'){addText(e,canvas,pg);return;}
    canvas.setPointerCapture(e.pointerId);
    drawing=true;
    activeAnn=canvas;activeCtx=canvas.getContext('2d');
    const {x,y}=gp(e,canvas);
    lastEX=x;lastEY=y;

    if(tool==='eraser'){
      // Eraser: no snapshot needed, just draw incrementally
      const ctx=activeCtx;
      ctx.save();
      ctx.globalCompositeOperation='destination-out';
      ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(x,y,sz*3,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else {
      // For drawing tools: snapshot canvas state BEFORE this stroke
      // Use structuredClone-free approach: only snapshot for tools that redraw on move
      preSnap=activeCtx.getImageData(0,0,canvas.width,canvas.height);
      ptBuf=[{x,y,p:e.pressure||0.5}];
    }
  },{passive:true});

  canvas.addEventListener('pointermove',e=>{
    if(tool==='eraser'){
      // Show visual cursor
      showEraserCursor(e.clientX,e.clientY,sz*3*(canvas.getBoundingClientRect().width/canvas.width));
      if(!drawing)return;
      const {x,y}=gp(e,canvas);
      const ctx=activeCtx||canvas.getContext('2d');
      ctx.save();
      ctx.globalCompositeOperation='destination-out';
      ctx.globalAlpha=1;
      ctx.lineWidth=sz*6;
      ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(lastEX,lastEY);ctx.lineTo(x,y);ctx.stroke();
      // Also fill circle at current position for solid erase
      ctx.beginPath();ctx.arc(x,y,sz*3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      lastEX=x;lastEY=y;
      return;
    }
    if(!drawing)return;
    const {x,y}=gp(e,canvas);
    const p=Math.max(0.05,e.pressure||0.5);
    ptBuf.push({x,y,p});
    const ctx=activeCtx;

    // Restore snapshot → redraw whole stroke from scratch (smooth curves)
    ctx.putImageData(preSnap,0,0);

    if(tool==='pen'){
      smoothDraw(ctx,ptBuf,sz,color,1,'source-over');
    } else if(tool==='ink'){
      smoothDraw(ctx,ptBuf,sz*2,color,0.78,'source-over');
    } else if(tool==='highlight'){
      smoothDraw(ctx,ptBuf,sz*7,color,0.28,'source-over');
    } else {
      // Shape preview
      const s=ptBuf[0],c=ptBuf[ptBuf.length-1];
      ctx.save();
      ctx.strokeStyle=color;ctx.lineWidth=sz;
      ctx.lineCap='round';ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
      ctx.beginPath();
      if(tool==='line'){ctx.moveTo(s.x,s.y);ctx.lineTo(c.x,c.y);}
      else if(tool==='rect'){ctx.rect(s.x,s.y,c.x-s.x,c.y-s.y);}
      else{
        const rx=Math.abs(c.x-s.x)/2,ry=Math.abs(c.y-s.y)/2;
        ctx.ellipse(s.x+(c.x-s.x)/2,s.y+(c.y-s.y)/2,rx||1,ry||1,0,0,Math.PI*2);
      }
      ctx.stroke();ctx.restore();
    }
  },{passive:true});

  const endStroke=e=>{
    if(!drawing)return;
    drawing=false;
    hideEraserCursor();
    const ctx=activeCtx||canvas.getContext('2d');
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    if(!annData[pg])annData[pg]=[];
    // Save snapshot for undo — only getImageData here (on stroke END, not during move)
    annData[pg].push({imgData:ctx.getImageData(0,0,canvas.width,canvas.height),w:canvas.width,h:canvas.height});
    ptBuf=[];preSnap=null;
    updateThumb(pg);
    markDirty(); // Just flag as dirty — actual save happens on 3-min timer or tab close
  };
  canvas.addEventListener('pointerup',endStroke,{passive:true});
  canvas.addEventListener('pointercancel',endStroke,{passive:true});
  canvas.addEventListener('pointerleave',e=>{
    hideEraserCursor();
    endStroke(e);
  },{passive:true});
}

// ── TEXT TOOL ──
let txtCvs=null,txtPg=null,txtX=0,txtY=0;
function addText(e,canvas,pg){
  const {x,y}=gp(e,canvas);
  txtCvs=canvas;txtPg=pg;txtX=x;txtY=y;
  const r=canvas.getBoundingClientRect();
  const ta=document.getElementById('txt-in');
  ta.style.display='block';
  ta.style.left=(r.left+x*(r.width/canvas.width))+'px';
  ta.style.top=(r.top+y*(r.height/canvas.height))+'px';
  ta.style.fontSize=(sz*4+10)+'px';
  ta.style.color=color;
  ta.value='';ta.focus();
}
document.getElementById('txt-in').addEventListener('blur',commitTxt);
document.getElementById('txt-in').addEventListener('keydown',e=>{
  if(e.key==='Escape')cancelTxt();
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitTxt();}
});
function commitTxt(){
  const ta=document.getElementById('txt-in');
  const v=ta.value.trim();
  if(v&&txtCvs){
    const fsize=sz*4+10;
    const ctx=txtCvs.getContext('2d');
    ctx.font=`${fsize}px 'Segoe UI',sans-serif`;
    ctx.fillStyle=color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    v.split('\n').forEach((ln,i)=>ctx.fillText(ln,txtX,txtY+fsize*(i+1)));
    if(!annData[txtPg])annData[txtPg]=[];
    annData[txtPg].push({imgData:ctx.getImageData(0,0,txtCvs.width,txtCvs.height),w:txtCvs.width,h:txtCvs.height});
    updateThumb(txtPg);markDirty();
  }
  cancelTxt();
}
function cancelTxt(){
  document.getElementById('txt-in').style.display='none';
  txtCvs=null;
}

// ── THUMBNAILS ──
function updateThumb(pg){
  const e=wrappers.find(w=>w.pg===pg);
  const tc=thumbCvs[pg];
  if(!e||!tc)return;
  const ctx=tc.getContext('2d');
  ctx.clearRect(0,0,tc.width,tc.height);
  ctx.drawImage(e.pdfC,0,0,tc.width,tc.height);
  ctx.drawImage(e.annC,0,0,tc.width,tc.height);
}

// ── INDEX ──
function toggleIdx(){
  idxOpen=!idxOpen;
  document.getElementById('page-index').classList.toggle('collapsed',!idxOpen);
}

// ── SCROLL SPY ──
function setupScrollSpy(){
  const area=document.getElementById('canvas-area');
  area.addEventListener('scroll',()=>{
    const mid=area.scrollTop+area.clientHeight/2;
    let best=1,bd=Infinity;
    wrappers.forEach(({wrap,pg})=>{
      const d=Math.abs(wrap.offsetTop+wrap.offsetHeight/2-mid);
      if(d<bd){bd=d;best=pg;}
    });
    if(best!==curPage){curPage=best;updateNav();}
  },{passive:true});
}
function updateNav(){
  document.getElementById('pg-inp').value=curPage;
  document.getElementById('pp').disabled=curPage<=1;
  document.getElementById('np').disabled=curPage>=totalPgs;
  document.querySelectorAll('.thumb-item').forEach(el=>{
    el.classList.toggle('active',+el.dataset.pg===curPage);
  });
  const active=document.querySelector('.thumb-item.active');
  if(active)active.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function scrollToPage(p){
  if(p<1||p>totalPgs)return;
  curPage=p;
  const e=wrappers.find(w=>w.pg===p);
  if(e)e.wrap.scrollIntoView({behavior:'smooth',block:'start'});
  updateNav();
}
function navPage(d){scrollToPage(curPage+d)}
function goToPage(p){scrollToPage(Math.min(totalPgs,Math.max(1,p||1)))}

// ── UNDO / CLEAR ──
function undoPage(){
  const e=wrappers.find(w=>w.pg===curPage);if(!e)return;
  const snaps=annData[curPage];
  if(snaps&&snaps.length){
    snaps.pop();
    const ctx=e.annC.getContext('2d');
    ctx.clearRect(0,0,e.annC.width,e.annC.height);
    if(snaps.length)ctx.putImageData(snaps[snaps.length-1].imgData,0,0);
    updateThumb(curPage);markDirty();
    toast('↩ Deshecho');
  }
}
function clearPage(){
  const e=wrappers.find(w=>w.pg===curPage);if(!e)return;
  e.annC.getContext('2d').clearRect(0,0,e.annC.width,e.annC.height);
  annData[curPage]=[];
  updateThumb(curPage);markDirty();
  toast('🗑 Página limpiada');
}

// ── EXPORT PDF ──
async function exportPDF(){
  if(!pdfDoc)return;
  toast('⏳ Generando PDF…');
  const {jsPDF}=window.jspdf;
  let doc=null;
  for(let p=1;p<=totalPgs;p++){
    const e=wrappers.find(w=>w.pg===p);if(!e)continue;
    const m=document.createElement('canvas');
    m.width=e.pdfC.width;m.height=e.pdfC.height;
    const mc=m.getContext('2d');
    mc.drawImage(e.pdfC,0,0);mc.drawImage(e.annC,0,0);
    const img=m.toDataURL('image/jpeg',.93);
    const wm=m.width*.2646,hm=m.height*.2646;
    if(!doc)doc=new jsPDF({orientation:wm>hm?'l':'p',unit:'mm',format:[wm,hm]});
    else doc.addPage([wm,hm],wm>hm?'l':'p');
    doc.addImage(img,'JPEG',0,0,wm,hm,undefined,'FAST');
  }
  if(doc){doc.save('anotado.pdf');toast('✓ PDF exportado');}
}

// ── ZOOM ──
function doZoom(d,reset=false){
  zoom=reset?1.3:Math.min(3,Math.max(.4,zoom+d));
  if(!pdfDoc)return;
  // Save current ann states as dataURLs, re-render, restore
  const saved={};
  wrappers.forEach(({annC,pg})=>{saved[pg]=annC.toDataURL('image/png')});
  renderAll(saved);
}

// ── TOOLS ──
function setTool(t){
  tool=t;
  if(t!=='eraser') hideEraserCursor();
  document.querySelectorAll('.t').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('t-'+t);if(el)el.classList.add('on');
  const cur=t==='eraser'?'none':t==='text'?'text':'crosshair';
  document.querySelectorAll('.c-ann').forEach(c=>c.style.cursor=cur);
}
function setColor(el){
  color=el.dataset.c;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}

// ── HELPERS ──
function gp(e,canvas){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(['TEXTAREA','INPUT'].includes(e.target.tagName))return;
  const m={p:'pen',i:'ink',h:'highlight',e:'eraser',t:'text'};
  if(m[e.key])setTool(m[e.key]);
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoPage();}
  if(e.key==='+'||e.key==='=')doZoom(.15);
  if(e.key==='-')doZoom(-.15);
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navPage(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navPage(-1);
});
</script>
